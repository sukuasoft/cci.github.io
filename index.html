<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title t-id="app-title"></title>
  </head>
  <body>
    <main class="page">
      <div class="lang-switch fade-up" role="group">
        <span class="lang-label" t-id="language"></span>
        <button type="button" class="lang-btn" data-lang="pt" aria-pressed="false">PT</button>
        <button type="button" class="lang-btn" data-lang="en" aria-pressed="false">EN</button>
      </div>

      <div class="orb orb-left" aria-hidden="true"></div>
      <div class="orb orb-right" aria-hidden="true"></div>
      <div class="pattern-layer" aria-hidden="true"></div>

      <section class="content-wrap">
        <div class="layout-grid">
          <div class="hero-card fade-up">
            <p class="badge fade-up delay-1" t-id="coming-soon"></p>
            <div class="flags-box fade-up delay-2">
              <img src="./assets/angola-flag.png" class="flag"  />
              <span class="divider" aria-hidden="true"></span>
              <img src="./assets/botswana-flag.png" class="flag" />
            </div>

            <div class="org-copy fade-up delay-2">
            
              <p class="org-en">
            <span class="angola">Angola</span> - <span class="botswana">Botswana</span>
                   <br />
              <span t-id="cci"></span></p>
              <p class="contact-info">
                <span t-id="contact"></span>
                <a class="contact-link" href="mailto:info@aobwconnect.org">info@aobwconnect.org</a>
              </p>
            </div>
          </div>

          <aside class="construction-card fade-up delay-2">
            <div class="video-shell">
              <video
                src="./assets/construction.mp4"
                autoplay
                muted
                loop
                playsinline
                class="construction-video"
              ></video>
              <div class="video-vignette" aria-hidden="true"></div>
              <span class="video-chip" t-id="in-construction"></span>
            </div>

          <p class="card-title" t-id="tagline"></p>
          </aside>
        </div>
      </section>
    </main>
    <script type="module" src="script.js"></script>
  </body>
</html>
