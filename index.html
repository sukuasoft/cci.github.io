<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Câmara do Comércio e Indústria - Angola & Botswana</title>
  </head>
  <body>
    <main class="page">
      <div class="orb orb-left" aria-hidden="true"></div>
      <div class="orb orb-right" aria-hidden="true"></div>
      <div class="pattern-layer" aria-hidden="true"></div>

      <section class="content-wrap">
        <div class="layout-grid">
          <div class="hero-card fade-up">
            <p class="badge fade-up delay-1">Em Breve • Coming Soon</p>

            <h1 class="app-title fade-up delay-1">Site esta em desenvolvimento</h1>
            <p class="subtitle fade-up delay-2">Website is under development</p>

            <div class="flags-box fade-up delay-2" aria-label="Bandeiras de Angola e Botswana">
              <img src="./assets/angola-flag.png" alt="Bandeira de Angola" class="flag" />
              <span class="divider" aria-hidden="true"></span>
              <img src="./assets/botswana-flag.png" alt="Bandeira do Botswana" class="flag" />
            </div>

            <div class="org-copy fade-up delay-2">
              <p class="org-pt">Câmara de Comércio e Indústria <span class="angola">Angola</span> - <span class="botswana">Botswana</span></p>
              <p class="org-en">Chamber of Commerce and Industry <span class="angola">Angola</span> - <span class="botswana">Botswana</span></p>
            </div>
          </div>

          <aside class="construction-card fade-up delay-2" aria-label="Animacao de construcao do site">
            <div class="video-shell">
              <video
                src="./assets/construction.mp4"
                autoplay
                muted
                loop
                playsinline
                class="construction-video"
                aria-label="Ambiente visual de construcao"
              ></video>
              <div class="video-vignette" aria-hidden="true"></div>
              <span class="video-chip">Em producao</span>
            </div>

            <p class="card-title">A construir algo grande</p>
            <p class="card-subtitle">Building something remarkable</p>
          </aside>
        </div>
      </section>
    </main>
  </body>
</html>
